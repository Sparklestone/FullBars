name: FullBars
options:
  bundleIdPrefix: com.fullbars
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "7588DAA645"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: FullBars/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.fullbars.app
    PRODUCT_NAME: FullBars
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: "YES"
targets:
  FullBars:
    type: application
    platform: iOS
    sources:
      - path: FullBars
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: FullBars/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fullbars.app
        PRODUCT_NAME: FullBars
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "YES"
    dependencies:
      - sdk: ARKit.framework
      - sdk: SceneKit.framework
      - sdk: RoomPlan.framework
        weak: true
    info:
      path: FullBars/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arkit
          - metal
          - wifi
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: FullBars/FullBars.entitlements
      properties:
        com.apple.developer.networking.HotspotConfiguration: true
        com.apple.developer.networking.wifi-info: true
