name: SwiftLint

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.swift'
  push:
    branches: [main]
    paths:
      - '**/*.swift'
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging
