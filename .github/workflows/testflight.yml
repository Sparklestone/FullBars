name: TestFlight

on:
  push:
    tags:
      - 'v*'            # push a tag like v1.0.0-beta.1 to trigger
  workflow_dispatch:      # or run manually from the Actions tab

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 30

    env:
      SCHEME: FullBars
      ARCHIVE: FullBars.xcarchive
      EXPORT_DIR: export

    steps:
      - uses: actions/checkout@v4

      # ── Certificates & provisioning ──────────────────────────
      - name: Install Apple certificate & provisioning profile
        env:
          P12_BASE64:             ${{ secrets.P12_BASE64 }}
          P12_PASSWORD:           ${{ secrets.P12_PASSWORD }}
          PROVISIONING_BASE64:    ${{ secrets.PROVISIONING_BASE64 }}
          KEYCHAIN_PASSWORD:      ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KC_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$PROVISIONING_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security list-keychain -d user -s "$KC_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Build archive ────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -archivePath "$ARCHIVE" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            | xcbeautify

      # ── Export IPA ───────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$EXPORT_DIR" \
            | xcbeautify

      # ── Upload to TestFlight ─────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID:       ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:    ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64:   ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          xcrun altool --upload-app \
            -f "$EXPORT_DIR/FullBars.ipa" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --apiKeyPath "$KEY_PATH"

      # ── Cleanup ──────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
